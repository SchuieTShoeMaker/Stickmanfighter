<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stickman Combat</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: linear-gradient(#87CEEB, #b0d8f0);
  font-family: sans-serif;
}

/* ===== CANVAS ===== */
canvas {
  display: block;
}

/* ===== JOYSTICK ===== */
#joystick {
  position: fixed;
  bottom: 30px;
  left: 30px;
  width: 100px;
  height: 100px;
  background: rgba(0,0,0,0.2);
  border-radius: 50%;
}

#stick {
  position: absolute;
  left: 30px;
  top: 30px;
  width: 40px;
  height: 40px;
  background: white;
  border-radius: 50%;
}

/* ===== BUTTONS ===== */
.btn {
  position: fixed;
  bottom: 40px;
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: rgba(255,255,255,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

#jumpBtn { right: 120px; }
#attackBtn { right: 40px; }

/* ===== SHOP OVERLAY (FULL SCREEN) ===== */
#shop {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background: rgba(20, 30, 40, 0.85);
  backdrop-filter: blur(6px);

  display: flex;
  align-items: center;
  justify-content: center;

  z-index: 1000;
}

/* ===== SHOP CARD ===== */
.shopBox {
  width: 320px;
  padding: 25px;

  background: linear-gradient(145deg, #f0f4f8, #d9e2ec);
  border-radius: 20px;

  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  text-align: center;
}

/* headings */
.shopBox h2 {
  margin-bottom: 10px;
}

.shopBox p {
  margin-bottom: 15px;
}

/* buttons */
.shopBtn {
  margin: 8px 0;
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 12px;
  background: #7fc8a9;
  color: white;
  font-size: 16px;
  transition: 0.2s;
}

.shopBtn:hover {
  background: #6ab89b;
}

.shopBtn:active {
  transform: scale(0.95);
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<!-- JOYSTICK -->
<div id="joystick">
  <div id="stick"></div>
</div>

<!-- BUTTONS -->
<div id="jumpBtn" class="btn">⬆️</div>
<div id="attackBtn" class="btn">⚔️</div>

<!-- SHOP -->
<div id="shop">
  <div class="shopBox">
    <h2>🛒 Shop</h2>
    <p id="shopMoney">Money: $0</p>

    <button class="shopBtn" onclick="buyDamage()">+Damage (50)</button>
    <button class="shopBtn" onclick="buyArmor()">+Armor (100)</button>
    <button class="shopBtn" onclick="buyPoison()">Poison (150)</button>

    <h3>Weapons</h3>
    <button class="shopBtn" onclick="setWeapon('sword')">Sword</button>
    <button class="shopBtn" onclick="setWeapon('dagger')">Dagger</button>
    <button class="shopBtn" onclick="setWeapon('hammer')">Hammer</button>

    <br><br>
    <button class="shopBtn" onclick="continueGame()">Continue</button>
  </div>
</div>

<script>
let gameStarted = false;
</script>



</body>
</html>
