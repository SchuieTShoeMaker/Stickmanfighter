<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- Prevent zoom -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Stickman Combat</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- GAME -->
<canvas id="game"></canvas>

<!-- SHOP -->
<div id="shop">
  <h2>Shop</h2>
  <p>Money: $<span id="shopMoney">0</span></p>

  <button onclick="buyDamage()">+Damage (50)</button>
  <button onclick="buyArmor()">+Armor (100)</button>
  <button onclick="buyPoison()">Poison (150)</button>

  <h3>Weapons</h3>
  <button onclick="setWeapon('sword')">Sword</button>
  <button onclick="setWeapon('dagger')">Dagger</button>
  <button onclick="setWeapon('hammer')">Hammer</button>

  <br><br>
  <button onclick="continueGame()">Continue</button>
</div>

<!-- MOBILE BUTTONS -->
<button id="attackBtn">⚔️</button>
<button id="jumpBtn">⬆️</button>

<!-- GAME OVER -->
<div id="gameOver">
  <h1>Game Over</h1>
  <button onclick="location.reload()">Restart</button>
</div>

<script src="script.js"></script>

</body>
</html>
