<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stickman Combat</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: linear-gradient(#87CEEB, #b0d8f0);
  font-family: sans-serif;
}

/* ===== CANVAS ===== */
canvas {
  display: block;
}

/* ===== JOYSTICK ===== */
#joystick {
  position: fixed;
  bottom: 30px;
  left: 30px;
  width: 100px;
  height: 100px;
  background: rgba(0,0,0,0.2);
  border-radius: 50%;
}

#stick {
  position: absolute;
  left: 30px;
  top: 30px;
  width: 40px;
  height: 40px;
  background: white;
  border-radius: 50%;
}

/* ===== BUTTONS ===== */
.btn {
  position: fixed;
  bottom: 40px;
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: rgba(255,255,255,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

#jumpBtn { right: 120px; }
#attackBtn { right: 40px; }

/* ===== SHOP OVERLAY (FULL SCREEN) ===== */
#shop {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background: rgba(20, 30, 40, 0.85);
  backdrop-filter: blur(6px);

  display: flex;
  align-items: center;
  justify-content: center;

  z-index: 1000;
}

/* ===== SHOP CARD ===== */
.shopBox {
  width: 320px;
  padding: 25px;

  background: linear-gradient(145deg, #f0f4f8, #d9e2ec);
  border-radius: 20px;

  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  text-align: center;
}

/* headings */
.shopBox h2 {
  margin-bottom: 10px;
}

.shopBox p {
  margin-bottom: 15px;
}

/* buttons */
.shopBtn {
  margin: 8px 0;
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 12px;
  background: #7fc8a9;
  color: white;
  font-size: 16px;
  transition: 0.2s;
}

.shopBtn:hover {
  background: #6ab89b;
}

.shopBtn:active {
  transform: scale(0.95);
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<!-- JOYSTICK -->
<div id="joystick">
  <div id="stick"></div>
</div>

<!-- BUTTONS -->
<div id="jumpBtn" class="btn">⬆️</div>
<div id="attackBtn" class="btn">⚔️</div>

<!-- SHOP -->
<div id="shop">
  <div class="shopBox">
    <h2>🛒 Shop</h2>
    <p id="shopMoney">Money: $0</p>

    <button class="shopBtn" onclick="buyDamage()">+Damage (50)</button>
    <button class="shopBtn" onclick="buyArmor()">+Armor (100)</button>
    <button class="shopBtn" onclick="buyPoison()">Poison (150)</button>

    <h3>Weapons</h3>
    <button class="shopBtn" onclick="setWeapon('sword')">Sword</button>
    <button class="shopBtn" onclick="setWeapon('dagger')">Dagger</button>
    <button class="shopBtn" onclick="setWeapon('hammer')">Hammer</button>

    <br><br>
    <button class="shopBtn" onclick="continueGame()">Continue</button>
  </div>
</div>

<script>
// ===== CANVAS =====
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight * 0.6;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

const ground = () => canvas.height - 80;

// ===== PLAYER =====
const player = {
  x: 100, y: 100, w: 20, h: 40,
  hp: 100, vx: 0, vy: 0,
  speed: 3, jump: 10,
  onGround: false,
  walkAnim: 0,
  attackAnim: 0
};

let playerHitTimer = 0;
let shake = 0;

// ===== GAME STATE =====
let enemies = [];
let projectiles = [];
let wave = 1;

let gameStarted = false;

let money = 0;
let playerDamage = 15;
let playerArmor = 0;
let hasPoison = false;

// ===== SHOP / WEAPONS =====
let inShop = false;
let weapon = "sword";
let attackCooldownMax = 20;
let attackCooldown = 0;

// ===== ABILITIES =====
let abilityTimer = 0;
let isDashing = false;

// ===== ENEMY UNLOCKS =====
let unlockedEnemies = {
  fast: false,
  tank: false,
  ranged: false
};

// ===== INPUT =====
let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// MOBILE
const joystick = document.getElementById("joystick");
const stick = document.getElementById("stick");
const attackBtn = document.getElementById("attackBtn");
const jumpBtn = document.getElementById("jumpBtn");

let joyX = 0;
let jumpCooldown = 0;
// ===== JOYSTICK CONTROL =====
let dragging = false;

joystick.addEventListener("touchstart", e => {
  dragging = true;
});

joystick.addEventListener("touchmove", e => {
  if (!dragging) return;

  let touch = e.touches[0];
  let rect = joystick.getBoundingClientRect();

  let x = touch.clientX - rect.left - 50;

  joyX = Math.max(-1, Math.min(1, x / 40));

  stick.style.left = (30 + joyX * 30) + "px";
});

joystick.addEventListener("touchend", () => {
  dragging = false;
  joyX = 0;
  stick.style.left = "30px";
});
// ===== SPAWN =====
function spawnWave() {
  enemies = [];

  if (wave >= 3) unlockedEnemies.fast = true;
  if (wave >= 6) unlockedEnemies.tank = true;
  if (wave >= 9) unlockedEnemies.ranged = true;

  if (wave % 5 === 0) {
    enemies.push({
      x: canvas.width / 2,
      w: 60, h: 100,
      hp: 300, maxHp: 300,
      speed: 1,
      isBoss: true,
      stage: 1,
      poison: 0,
      dead: false,
      attackCooldown: 0,
      attackAnim: 0,
      walkAnim: 0
    });
    return;
  }

  for (let i = 0; i < wave * 2; i++) {
    let types = ["normal"];
    if (unlockedEnemies.fast) types.push("fast");
    if (unlockedEnemies.tank) types.push("tank");
    if (unlockedEnemies.ranged) types.push("ranged");

    let type = types[Math.floor(Math.random() * types.length)];

    let e = {
      x: Math.random() * canvas.width,
      w: 20, h: 40,
      hp: 30, maxHp: 30,
      speed: 1.5,
      type,
      isBoss: false,
      poison: 0,
      dead: false,
      attackCooldown: 0,
      attackAnim: 0,
      walkAnim: 0,
      shootCooldown: 60
    };

    if (type === "fast") { e.speed = 3; e.hp = 20; }
    if (type === "tank") { e.hp = 80; e.maxHp = 80; e.speed = 0.8; }
    if (type === "ranged") { e.hp = 25; e.speed = 1.2; }

    enemies.push(e);
  }
}

// ===== ATTACK =====
function attack() {
  if (attackCooldown > 0) return;

  attackCooldown = attackCooldownMax;
  player.attackAnim = 10;

  if (weapon === "sword") {
    abilityTimer = 10;
    enemies.forEach(e => {
      if (Math.abs(e.x - player.x) < 70) {
        e.hp -= playerDamage;
        if (hasPoison) e.poison = 60;
      }
    });
  }

  if (weapon === "dagger") {
    isDashing = true;
    abilityTimer = 10;
    player.vx = (player.vx >= 0 ? 1 : -1) * 12;
  }

  if (weapon === "hammer") {
    abilityTimer = 15;
    shake = 20;
    enemies.forEach(e => {
      if (Math.abs(e.x - player.x) < 100) {
        e.hp -= playerDamage * 1.5;
      }
    });
  }
}

// ===== SHOP =====
function buyDamage() {
  if (money >= 50) { money -= 50; playerDamage += 5; }
}
function buyArmor() {
  if (money >= 100) { money -= 100; playerArmor += 1; }
}
function buyPoison() {
  if (money >= 150 && !hasPoison) {
    money -= 150;
    hasPoison = true;
  }
}
function setWeapon(w) {
  weapon = w;
  if (w === "sword") attackCooldownMax = 20;
  if (w === "dagger") attackCooldownMax = 10;
  if (w === "hammer") attackCooldownMax = 35;
}
function continueGame() {
  inShop = false;
  document.getElementById("shop").style.display = "none";
  wave++;
  spawnWave();
}

// ===== UPDATE =====
function update() {
  if (inShop) return;

  if (attackCooldown > 0) attackCooldown--;
  if (abilityTimer > 0) abilityTimer--;
if (jumpCooldown > 0) jumpCooldown--;
// joystick movement
let targetVX = joyX * player.speed;

// keyboard override
if (keys["a"]) targetVX = -player.speed;
if (keys["d"]) targetVX = player.speed;

// smooth movement
player.vx += (targetVX - player.vx) * 0.2;

  player.x += player.vx;

  if (Math.abs(player.vx) > 0.1) player.walkAnim += 0.2;
  else player.walkAnim = 0;

player.onGround = false;
  player.vy += 0.5;
  player.y += player.vy;

if (player.y + player.h > ground()) {
  player.y = ground() - player.h;

  if (player.vy >= 0) {
    player.onGround = true;
  }

  player.vy = 0;
}

if (keys["w"] && player.onGround && jumpCooldown <= 0) {
  player.vy = -player.jump;
  player.onGround = false;
  jumpCooldown = 10;
}

  if (isDashing && abilityTimer <= 0) isDashing = false;

  // ===== ENEMIES =====
  enemies.forEach(e => {
    e.y = ground() - e.h;
    e.walkAnim += 0.15;

    if (e.isBoss) {
      let hp = e.hp / e.maxHp;
      if (hp < 0.66) e.stage = 2;
      if (hp < 0.33) e.stage = 3;
    }

    if (e.x < player.x) e.x += e.speed;
    else e.x -= e.speed;

    // ranged
    if (e.type === "ranged") {
      if (e.shootCooldown <= 0) {
        projectiles.push({
          x: e.x,
          y: e.y + 20,
          vx: player.x > e.x ? 4 : -4,
          hit: false
        });
        e.shootCooldown = 90;
      } else e.shootCooldown--;
    }

    // damage
if (
  Math.abs(e.x - player.x) < 20 &&
  Math.abs(e.y - player.y) < 30 &&
  player.onGround && 
  e.attackCooldown <= 0
) {
  let dmg = e.isBoss ? (e.stage === 3 ? 20 : 12) : 2;
  dmg = Math.max(0, dmg - playerArmor);

  player.hp -= dmg;
  playerHitTimer = 10;

  let dir = player.x > e.x ? 1 : -1;
  player.vx += dir * (e.isBoss ? 8 : 4);

  shake = e.isBoss ? 15 : 8;

  e.attackAnim = 10;
  e.attackCooldown = e.isBoss ? 40 : 25;
}


    if (e.attackCooldown > 0) e.attackCooldown--;
    if (e.attackAnim > 0) e.attackAnim--;

    if (e.poison > 0) {
      e.hp -= 0.3;
      e.poison--;
    }

    if (e.hp <= 0 && !e.dead) {
      money += e.isBoss ? 50 : 10;
      e.dead = true;
    }
  });

  enemies = enemies.filter(e => e.hp > 0);

  // ===== PROJECTILES =====
  projectiles.forEach(p => {
    p.x += p.vx;

    if (Math.abs(p.x - player.x) < 10 &&
        Math.abs(p.y - player.y) < 20) {
      player.hp -= 5;
      shake = 5;
      p.hit = true;
    }
  });

  projectiles = projectiles.filter(p => !p.hit && p.x > 0 && p.x < canvas.width);

  // ===== SHOP =====
  if (enemies.length === 0 && !inShop) {
    inShop = true;
    document.getElementById("shop").style.display = "block";
    document.getElementById("shopMoney").innerText = money;
  }

  if (player.hp <= 0) {
    alert("Game Over");
    location.reload();
  }
}

// ===== DRAW CATNAP =====
function drawCatnap(e) {
  let x = e.x;
  let y = e.y + Math.sin(Date.now()/200)*5;

  ctx.fillStyle = "rgba(80,0,120,0.3)";
  ctx.beginPath();
  ctx.arc(x+30,y+50,70,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle = "#4b0082";
  ctx.beginPath();
  ctx.ellipse(x+30,y+50,25,35,0,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle = "black";
  ctx.beginPath();
  ctx.arc(x+20,y+40,6,0,Math.PI*2);
  ctx.arc(x+40,y+40,6,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle = "hotpink";
  ctx.beginPath();
  ctx.arc(x+20,y+40,2,0,Math.PI*2);
  ctx.arc(x+40,y+40,2,0,Math.PI*2);
  ctx.fill();
}

// ===== DRAW STICKMAN =====
function drawStickman(x,y,w,h,color,walk,attack){
  ctx.strokeStyle=color;
  let swing=Math.sin(walk)*6;

  ctx.beginPath();
  ctx.arc(x+w/2,y+10,6,0,Math.PI*2);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(x+w/2,y+16);
  ctx.lineTo(x+w/2,y+30);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(x+w/2,y+22);
  ctx.lineTo(x+w/2+(attack>0?10:swing),y+22);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(x+w/2,y+30);
  ctx.lineTo(x+w/2-swing,y+40);
  ctx.moveTo(x+w/2,y+30);
  ctx.lineTo(x+w/2+swing,y+40);
  ctx.stroke();
}

// ===== DRAW =====
function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle = "red";
ctx.fillRect(0, 0, 10, 10);
ctx.save();

// 🔥 APPLY CAMERA OFFSET FIRST
ctx.translate(0, -80);

// 🔥 THEN APPLY SHAKE ON TOP
ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);
  if(shake>0)shake--;

  ctx.fillStyle="#222";
  ctx.fillRect(0,ground(),canvas.width,50);

  // player
  drawStickman(player.x,player.y,player.w,player.h,
    playerHitTimer>0?"red":"white",
    player.walkAnim,
    player.attackAnim
  );

  if(player.attackAnim>0)player.attackAnim--;

  // enemies
  enemies.forEach(e=>{
    if(e.isBoss) drawCatnap(e);
    else{
      let color="red";
      if(e.type==="fast") color="orange";
      if(e.type==="tank") color="blue";
      if(e.type==="ranged") color="yellow";

      drawStickman(e.x,e.y,e.w,e.h,color,e.walkAnim,e.attackAnim);

      if(e.poison>0){
        ctx.fillStyle="rgba(0,255,0,0.3)";
        ctx.fillRect(e.x,e.y,e.w,e.h);
      }
    }
  });

  ctx.restore();
  if (inShop) {
  // dark transparent overlay
  ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

  ctx.fillStyle="white";
  // ===== PLAYER HEALTH BAR =====
let barWidth = 200;
let barHeight = 20;
let hpPercent = player.hp / 100;

ctx.fillStyle = "red";
ctx.fillRect(10, 70, barWidth, barHeight);

ctx.fillStyle = "lime";
ctx.fillRect(10, 70, barWidth * hpPercent, barHeight);

ctx.strokeStyle = "white";
ctx.strokeRect(10, 70, barWidth, barHeight);

  ctx.fillText("Wave: "+wave,10,20);
  ctx.fillText("HP: "+player.hp,10,40);
  ctx.fillText("Money: $"+money,10,60);
}

// ===== LOOP =====
function gameLoop(){
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// ===== CONTROLS =====
attackBtn.addEventListener("touchstart",e=>{
  e.preventDefault();
  attack();
},{passive:false});

jumpBtn.addEventListener("touchstart", e => {
  e.preventDefault();

  if (player.onGround && jumpCooldown <= 0) {
    player.vy = -player.jump;
    player.onGround = false;
    jumpCooldown = 10;
  }

}, { passive: false });

// ===== START =====
if (!gameStarted) {
  gameStarted = true;
  spawnWave();
  gameLoop();
}

</script>
</body>
</html>
