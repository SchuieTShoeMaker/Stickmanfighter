<!DOCTYPE html>
<html>
<head>
  <title>Stickman Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="game"></canvas>

<!-- SHOP -->
<div id="shop">
  <h2>🌿 Shop</h2>

  <p>Money: <span id="shopMoney">0</span></p>

  <button onclick="buyDamage()">⚔️ Damage +5 ($50)</button>
  <button onclick="buyArmor()">🛡️ Armor +1 ($100)</button>
  <button onclick="buyPoison()">☠️ Poison ($150)</button>

  <hr>

  <h3>Weapons</h3>
  <button onclick="setWeapon('sword')">🗡️ Sword</button>
  <button onclick="setWeapon('dagger')">⚡ Dagger</button>
  <button onclick="setWeapon('hammer')">🔨 Hammer</button>

  <br><br>
  <button onclick="continueGame()">▶ Continue</button>
</div>

<!-- CONTROLS -->
<div id="joystick"><div id="stick"></div></div>
<button id="attackBtn">⚔️</button>
<button id="jumpBtn">⬆️</button>

<script src="script.js"></script>
</body>
</html>
